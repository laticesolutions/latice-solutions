<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal lattice icon -->
  <g transform="translate(10, 10)">
    <!-- Nodes -->
    <circle cx="10" cy="10" r="3.5" fill="#007AFF"/>
    <circle cx="30" cy="10" r="3.5" fill="#007AFF"/>
    <circle cx="10" cy="30" r="3.5" fill="#007AFF"/>
    <circle cx="30" cy="30" r="3.5" fill="#007AFF"/>
    <circle cx="20" cy="20" r="4" fill="#007AFF"/>
    
    <!-- Connections -->
    <line x1="10" y1="10" x2="30" y2="10" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="10" y2="30" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="30" y2="30" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="30" y2="30" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="20" y2="20" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="20" y2="20" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="20" y2="20" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
